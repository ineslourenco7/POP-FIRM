kind = "web"
previewPath = "/"
title = "PropFirm Platform"
version = "1.0.0"
id = "artifacts/prop-firm"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20120

[services.development]
run = "pnpm --filter @workspace/prop-firm run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prop-firm", "run", "build" ]
publicDir = "artifacts/prop-firm/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20120"
BASE_PATH = "/"
