<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuantFund · Checkout</title>
    <script>
      const params = new URLSearchParams(window.location.search);
      const plan = params.get('plan') || '1';
      window.location.replace('/checkout/' + encodeURIComponent(plan));
    </script>
  </head>
  <body style="margin:0;min-height:100vh;display:grid;place-items:center;background:#07111f;color:#f8fafc;font-family:Inter,Arial,sans-serif">
    <p>A abrir checkout seguro...</p>
  </body>
</html>
