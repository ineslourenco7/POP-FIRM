<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuantFund · Checkout</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, Arial, sans-serif; background:#07111f; color:#f8fafc; }
      body { margin:0; min-height:100vh; display:grid; place-items:center; background:radial-gradient(circle at top left, rgba(59,130,246,.2), transparent 35%), #07111f; }
      .card { width:min(520px, calc(100% - 32px)); border:1px solid rgba(148,163,184,.2); background:rgba(15,23,42,.9); border-radius:28px; padding:28px; box-shadow:0 24px 80px rgba(0,0,0,.35); text-align:center; }
      a { display:inline-flex; margin-top:18px; border-radius:16px; padding:14px 18px; background:#3b82f6; color:#07111f; font-weight:900; text-decoration:none; }
      p { color:#94a3b8; line-height:1.6; }
    </style>
  </head>
  <body>
    <main class="card">
      <p style="margin:0 0 8px;color:#7dd3fc;font-size:12px;font-weight:900;letter-spacing:.18em;text-transform:uppercase">QuantFund Checkout</p>
      <h1 style="margin:0;font-size:32px;line-height:1.05">Continua para o checkout</h1>
      <p>Esta página antiga foi substituída pelo checkout atual da QuantFund. Clica abaixo para avançar sem redirecionamentos automáticos.</p>
      <a id="checkoutLink" href="/checkout/1">Abrir checkout</a>
    </main>
    <script>
      const params = new URLSearchParams(window.location.search);
      const plan = params.get('plan') || '1';
      document.getElementById('checkoutLink').href = '/checkout/' + encodeURIComponent(plan);
    </script>
  </body>
</html>
