<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta | QuantFund</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(135deg, #07111f, #12345b);
      color: #ffffff;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
    }
    h1 { margin: 0 0 8px; font-size: 30px; }
    p { color: rgba(255, 255, 255, 0.72); line-height: 1.5; }
    label { display: block; margin: 18px 0 8px; font-size: 14px; color: rgba(255, 255, 255, 0.82); }
    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.1);
      color: #ffffff;
      outline: none;
      font-size: 16px;
    }
    input::placeholder { color: rgba(255, 255, 255, 0.5); }
    button {
      width: 100%;
      margin-top: 22px;
      padding: 14px 18px;
      border: 0;
      border-radius: 14px;
      background: #ffffff;
      color: #07111f;
      font-weight: 700;
      font-size: 16px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.65; cursor: not-allowed; }
    #msg { min-height: 24px; margin-top: 16px; }
    .error { color: #ffb4b4; }
    .success { color: #b8ffcf; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Criar Conta</h1>
    <p>Cria a tua conta QuantFund. Depois confirma o email para veres os desafios disponíveis.</p>

    <label for="email">Email</label>
    <input id="email" type="email" placeholder="o-teu-email@exemplo.com" autocomplete="email" />

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />

    <button id="submit" onclick="signUp()">Criar Conta</button>
    <p id="msg"></p>
  </main>

  <script>
    const SUPABASE_URL = 'https://aobxefjlelvalwfotyje.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_Oge9RIKPJA9eUyA987Of6Q_h3maEupu';
    const REDIRECT_URL = 'https://quantfund.pt';

    const { createClient } = supabase;
    const client = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function setMessage(text, type) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = type || '';
    }

    async function signUp() {
      const button = document.getElementById('submit');
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        setMessage('Preenche email e password.', 'error');
        return;
      }

      button.disabled = true;
      button.textContent = 'A criar...';
      setMessage('', '');

      const { error } = await client.auth.signUp({
        email,
        password,
        options: { emailRedirectTo: REDIRECT_URL }
      });

      if (error) {
        setMessage('Erro: ' + error.message, 'error');
        button.disabled = false;
        button.textContent = 'Criar Conta';
        return;
      }

      setMessage('Conta criada! Verifica o email.', 'success');
      setTimeout(() => { window.location.href = REDIRECT_URL; }, 2000);
    }
  </script>
</body>
</html>
